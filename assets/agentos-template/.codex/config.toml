developer_instructions = """
This trusted project uses the repo-local AgentOS kernel. AGENTS.md contains the
generated resident rules block. For non-small work, follow its startup route to
agent-os/boot.md and agent-os/router.md.

Codex-specific AgentOS startup is native to Codex:
- AGENTS.md supplies persistent project guidance before work starts; its managed
  block is generated from agent-os/rules-card.md.
- .agents/skills/ supplies Codex-native workflow adapters.
- .codex/hooks.json and .codex/hooks/ restore long-task attention and run
  deterministic checks.
- SessionStart restores only the current long-task finish line and open work;
  UserPromptSubmit asks the main model to re-read every real user message.
Do not use .codex/rules/ for AgentOS behavior rules; Codex rules/ is only for
command execution policy.
"""

[features]
hooks = true
