name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: package · tests · install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate clean template
        run: |
          python3 scripts/validate-agentos-install.py assets/agentos-template
          python3 assets/agentos-template/agent-os/tools/aos-lint.py

      - name: Run template tests
        working-directory: assets/agentos-template
        run: |
          python3 -m unittest discover -s tests/unit -p 'test_*.py'
          python3 -m unittest discover -s tests/integration -p 'test_*.py'
          python3 -m unittest discover -s tests/scenarios -p 'test_*.py'

      - name: Run installer behavior suite
        run: python3 scripts/test_installer_behavior.py

      - name: Install and validate a scratch project
        run: |
          python3 scripts/install-agentos.py "$RUNNER_TEMP/aos-target"
          python3 scripts/validate-agentos-install.py "$RUNNER_TEMP/aos-target"
          python3 "$RUNNER_TEMP/aos-target/agent-os/tools/aos-lint.py"
